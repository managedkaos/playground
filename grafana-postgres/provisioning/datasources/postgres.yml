apiVersion: 1

datasources:
  - name: PostgreSQL
    type: grafana-postgresql-datasource
    access: proxy
    url: postgres:5432/$POSTGRES_DB
    user: $POSTGRES_USER
    jsonData:
      sslmode: disable
      timescaledb: false
    secureJsonData:
      password: $POSTGRES_PASSWORD
    isDefault: true
    editable: true
