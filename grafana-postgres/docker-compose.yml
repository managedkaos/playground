services:
  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  seed:
    image: postgres:16
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["bash", "/scripts/seed.sh"]
    volumes:
      - ./scripts:/scripts

  grafana:
    image: grafana/grafana:11.4.0
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards

volumes:
  pgdata:
  grafana_data:
